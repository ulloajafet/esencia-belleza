services:
  # ─── Backend API ───────────────────────────────────────────
  - type: web
    name: esencia-belleza-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Lo llenas manualmente en Render Dashboard
      - key: FRONTEND_URL
        sync: false          # URL de tu frontend en Render
      - key: ADMIN_KEY
        sync: false          # Tu clave secreta de admin
    healthCheckPath: /health
    autoDeploy: true

  # ─── Frontend (Static Site) ────────────────────────────────
  - type: web
    name: esencia-belleza-frontend
    env: static
    rootDir: frontend
    buildCommand: echo "Static site, no build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
